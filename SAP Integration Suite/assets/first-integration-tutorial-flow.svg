<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="370" viewBox="0 0 1200 370" role="img" aria-labelledby="title desc">
  <title id="title">첫 Integration Suite 실습 흐름</title><desc id="desc">Integration Package와 iFlow 작성, 배포, API 노출, OAuth 정책, 호출 테스트 순서를 보여주는 다이어그램</desc>
  <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0L0 6L9 3Z" fill="#4b7188"/></marker><filter id="s"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-opacity=".13"/></filter></defs>
  <rect width="1200" height="370" rx="22" fill="#f5f9fc"/><text x="55" y="60" fill="#102a43" font-family="Segoe UI,Arial,sans-serif" font-size="27" font-weight="700">첫 실습: iFlow 작성부터 API 보호·호출까지</text>
  <g font-family="Segoe UI,Arial,sans-serif" filter="url(#s)"><rect x="55" y="130" width="175" height="120" rx="16" fill="#fff"/><text x="142" y="171" text-anchor="middle" fill="#0b6e99" font-size="18" font-weight="700">1. Package / iFlow</text><text x="142" y="201" text-anchor="middle" fill="#486581" font-size="15">프로젝트와 흐름 생성</text><rect x="280" y="130" width="175" height="120" rx="16" fill="#fff"/><text x="367" y="171" text-anchor="middle" fill="#0b6e99" font-size="18" font-weight="700">2. 처리 단계</text><text x="367" y="201" text-anchor="middle" fill="#486581" font-size="15">HTTPS · 변환 · OData</text><rect x="505" y="130" width="175" height="120" rx="16" fill="#fff"/><text x="592" y="171" text-anchor="middle" fill="#0b6e99" font-size="18" font-weight="700">3. Deploy</text><text x="592" y="201" text-anchor="middle" fill="#486581" font-size="15">테넌트에 배포</text><rect x="730" y="130" width="175" height="120" rx="16" fill="#fff"/><text x="817" y="171" text-anchor="middle" fill="#0b6e99" font-size="18" font-weight="700">4. API 정의</text><text x="817" y="201" text-anchor="middle" fill="#486581" font-size="15">엔드포인트 노출</text><rect x="955" y="130" width="190" height="120" rx="16" fill="#fff"/><text x="1050" y="171" text-anchor="middle" fill="#0b6e99" font-size="18" font-weight="700">5. OAuth 2.0 테스트</text><text x="1050" y="201" text-anchor="middle" fill="#486581" font-size="15">정책 적용 · 호출 검증</text></g>
  <g stroke="#4b7188" stroke-width="3" fill="none" marker-end="url(#a)"><path d="M230 190H270"/><path d="M455 190H495"/><path d="M680 190H720"/><path d="M905 190H945"/></g><text x="600" y="315" text-anchor="middle" fill="#486581" font-family="Segoe UI,Arial,sans-serif" font-size="15">실습은 샘플 데이터와 비운영 테넌트에서 수행하고, 운영 비밀값은 사용하지 않는다.</text>
</svg>
